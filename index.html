<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Колесо Фортуны</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://web-api.max.ru/v1.0/webapp.js"></script>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  background: radial-gradient(ellipse at top, #4c1d5a 0%, #2a0f3d 55%, #130421 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  color: #fff;
  overscroll-behavior: contain;
  min-height: 100vh;
  user-select: none;
}
body { display: flex; flex-direction: column; align-items: center; padding: 20px 16px 40px; position: relative; overflow-x: hidden; }

#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 60; }

.stars { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.stars i { position: absolute; border-radius: 50%; animation: twinkle 3s ease-in-out infinite; }
@keyframes twinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 0.9; transform: scale(1.5); }
}

.header { text-align: center; z-index: 10; margin-bottom: 20px; }
.header h1 {
  margin: 0; font-size: 30px; font-weight: 900;
  background: linear-gradient(90deg, #fbbf24, #f472b6, #fbbf24);
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
}
.header p { margin: 4px 0 0; font-size: 14px; color: #fbcfe8; opacity: 0.8; }

.wheel-wrap { position: relative; width: min(92vw, 380px); aspect-ratio: 1; z-index: 10; }

.pointer {
  position: absolute; top: -4px; left: 50%;
  transform: translateX(-50%); z-index: 20;
  animation: pointer-bounce 1.2s ease-in-out infinite;
}
@keyframes pointer-bounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(4px); }
}

.wheel-svg { width: 100%; height: 100%; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5)); }
.wheel-rotor { transform-origin: 200px 200px; transition: transform 5s cubic-bezier(0.17, 0.67, 0.15, 1); }

.start-btn {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 22%; height: 22%;
  border-radius: 50%; border: none;
  background: radial-gradient(circle at 30% 25%, #fde68a 0%, #f59e0b 55%, #78350f 100%);
  color: #fff; font-weight: 900;
  font-size: clamp(14px, 4vw, 18px); letter-spacing: 1px;
  text-shadow: 0 2px 3px rgba(0,0,0,0.5);
  cursor: pointer;
  animation: start-glow 2s ease-in-out infinite;
  z-index: 15; display: flex; align-items: center; justify-content: center;
}
.start-btn:active:not(:disabled) { transform: translate(-50%, -50%) scale(0.95); }
.start-btn:disabled { opacity: 0.65; cursor: not-allowed; animation: none; }
@keyframes start-glow {
  0%, 100% { box-shadow: 0 0 25px rgba(251, 191, 36, 0.55), 0 0 55px rgba(236, 72, 153, 0.35); }
  50%      { box-shadow: 0 0 40px rgba(251, 191, 36, 0.9),  0 0 85px rgba(236, 72, 153, 0.55); }
}

.spinner {
  display: inline-block; width: 24px; height: 24px;
  border: 3px solid #fff; border-top-color: transparent;
  border-radius: 50%; animation: spin-loader 0.9s linear infinite;
}
@keyframes spin-loader { to { transform: rotate(360deg); } }

.status { margin-top: 24px; text-align: center; color: #fbcfe8; opacity: 0.85; font-size: 14px; padding: 0 16px; max-width: 380px; z-index: 10; }

.error-box {
  margin: 20px 16px; padding: 14px 18px;
  background: rgba(220, 38, 38, 0.15);
  border: 1px solid rgba(220, 38, 38, 0.4);
  border-radius: 12px; color: #fecaca;
  text-align: center; max-width: 380px;
  font-size: 14px; z-index: 10;
}

.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
  display: flex; align-items: center; justify-content: center;
  padding: 16px; z-index: 50;
  animation: fade-in 0.25s ease;
}
@keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

.modal {
  position: relative; max-width: 320px; width: 100%;
  border-radius: 24px; padding: 28px 24px 22px;
  text-align: center; overflow: hidden;
  animation: modal-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes modal-pop {
  0%   { transform: scale(0.5); opacity: 0; }
  60%  { transform: scale(1.06); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

.modal.common { background: linear-gradient(135deg, #fff, #fce7f3); color: #831843; }
.modal.rare   { background: linear-gradient(135deg, #fdf2f8, #f472b6); color: #831843; }
.modal.super  {
  background: linear-gradient(135deg, #fef9c3 0%, #fbbf24 50%, #d97706 100%);
  color: #451a03;
  box-shadow: 0 0 70px rgba(251, 191, 36, 0.8), 0 25px 50px rgba(0,0,0,0.5);
}
.modal.super::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.6) 50%, transparent 60%);
  animation: shimmer 2s ease-in-out infinite; pointer-events: none;
}
@keyframes shimmer {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

.badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 999px;
  font-size: 11px; font-weight: 900; letter-spacing: 1.5px;
  margin-bottom: 14px;
}
.modal.common .badge { background: #ec4899; color: #fff; }
.modal.rare   .badge { background: #831843; color: #fce7f3; }
.modal.super  .badge { background: #78350f; color: #fef3c7; }

.modal .sub   { font-size: 13px; opacity: 0.75; margin-bottom: 6px; font-weight: 600; }
.modal .label { font-size: 34px; font-weight: 900; line-height: 1.1; margin-bottom: 10px; }
.modal.super .label { font-size: 40px; text-shadow: 0 2px 4px rgba(255,255,255,0.5); }
.modal .desc  { font-size: 12px; opacity: 0.8; margin: 14px 0 16px; line-height: 1.45; }

.modal button {
  width: 100%; padding: 14px 16px; border: none;
  border-radius: 999px; font-weight: 800; font-size: 15px;
  color: #fff; cursor: pointer; transition: transform 0.1s;
}
.modal button:active { transform: scale(0.96); }
.modal.common button, .modal.rare button {
  background: linear-gradient(135deg, #db2777, #9d174d);
}
.modal.super button { background: linear-gradient(135deg, #92400e, #7c2d12); }

.hidden { display: none !important; }
</style>
</head>
<body>
  <canvas id="confetti"></canvas>
  <div class="stars" id="stars"></div>

  <div class="header">
    <h1>Колесо Фортуны</h1>
    <p>Крутите и забирайте свой кэш!</p>
  </div>

  <div class="wheel-wrap">
    <div class="pointer">
      <svg width="42" height="56" viewBox="0 0 42 56">
        <defs>
          <linearGradient id="pointer-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fef3c7"/>
            <stop offset="60%" stop-color="#fbbf24"/>
            <stop offset="100%" stop-color="#b45309"/>
          </linearGradient>
        </defs>
        <path d="M 21 52 L 4 10 Q 4 2 13 2 L 29 2 Q 38 2 38 10 Z"
              fill="url(#pointer-grad)" stroke="#78350f" stroke-width="2.5"/>
        <circle cx="21" cy="14" r="4" fill="#fef3c7"/>
      </svg>
    </div>

    <svg class="wheel-svg" viewBox="0 0 400 400">
      <defs>
        <radialGradient id="grad-common-a" cx="0.3" cy="0.3">
          <stop offset="0%" stop-color="#f9a8d4"/><stop offset="100%" stop-color="#be185d"/>
        </radialGradient>
        <radialGradient id="grad-common-b" cx="0.3" cy="0.3">
          <stop offset="0%" stop-color="#fef3c7"/><stop offset="100%" stop-color="#b88c5a"/>
        </radialGradient>
        <radialGradient id="grad-rare" cx="0.3" cy="0.3">
          <stop offset="0%" stop-color="#f472b6"/><stop offset="100%" stop-color="#831843"/>
        </radialGradient>
        <radialGradient id="grad-super" cx="0.35" cy="0.3">
          <stop offset="0%" stop-color="#fef9c3"/>
          <stop offset="45%" stop-color="#fbbf24"/>
          <stop offset="100%" stop-color="#a16207"/>
        </radialGradient>
        <radialGradient id="outer-ring" cx="0.5" cy="0.5">
          <stop offset="85%" stop-color="#fbbf24"/>
          <stop offset="100%" stop-color="#78350f"/>
        </radialGradient>
        <radialGradient id="center-grad" cx="0.3" cy="0.3">
          <stop offset="0%" stop-color="#fef9c3"/>
          <stop offset="60%" stop-color="#fbbf24"/>
          <stop offset="100%" stop-color="#a16207"/>
        </radialGradient>
        <filter id="super-glow">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <circle cx="200" cy="200" r="196" fill="url(#outer-ring)"/>
      <circle cx="200" cy="200" r="187" fill="#1a0628"/>
      <g id="bulbs"></g>
      <g id="rotor" class="wheel-rotor"></g>
      <circle cx="200" cy="200" r="52" fill="#78350f" opacity="0.3"/>
      <circle cx="200" cy="200" r="48" fill="#fef3c7" stroke="#fbbf24" stroke-width="3"/>
      <circle cx="200" cy="200" r="45" fill="url(#center-grad)"/>
    </svg>

    <button id="start-btn" class="start-btn" disabled><span class="spinner"></span></button>
  </div>

  <div id="status" class="status">Загрузка...</div>
  <div id="error" class="error-box hidden"></div>

  <div id="modal-backdrop" class="modal-backdrop hidden" role="dialog" aria-modal="true">
    <div id="modal" class="modal common">
      <div class="badge" id="modal-badge">🎁 ВЫИГРЫШ</div>
      <div class="sub" id="modal-sub">Поздравляем!</div>
      <div class="label" id="modal-label">—</div>
      <div class="desc" id="modal-desc">Сделайте скриншот 📸 И перейдите по ссылке в чат боте</div>
      <button id="modal-close">Забрать приз</button>
    </div>
  </div>

<script>
// ==================== КОНФИГУРАЦИЯ ====================
const BACKEND_URL = 'https://d5db25gqg41ntc0j47bk.iwzqm34r.apigw.yandexcloud.net/api';

const PRIZES = [
  { id: 'cash_50',   label: 'Кэш 50₽',   tier: 'common' },
  { id: 'cash_500',  label: 'Кэш 500₽',  tier: 'super'  },
  { id: 'cash_100',  label: 'Кэш 100₽',  tier: 'common' },
  { id: 'cash_150',  label: 'Кэш 150₽',  tier: 'rare'   },
  { id: 'cash_10p',  label: 'Кэш 10%',   tier: 'common' },
  { id: 'cash_50p',  label: 'Кэш 50%',   tier: 'super'  },
  { id: 'cash_200',  label: 'Кэш 200₽',  tier: 'rare'   },
  { id: 'cash_100p', label: 'Кэш 100%',  tier: 'super'  },
];
const SVG_NS = 'http://www.w3.org/2000/svg';

// ==================== ОПРЕДЕЛЕНИЕ ПЛАТФОРМЫ ====================
// Вариант 1 — по URL-параметру ?platform=tg|max
// Вариант 2 — авто-определение по наличию SDK

function detectPlatform() {
  const urlParam = new URLSearchParams(window.location.search).get('platform');
  if (urlParam === 'tg' || urlParam === 'max') return urlParam;

  // MAX Bridge обычно регистрируется глобально под window.MaxApp или window.WebApp
  if (window.MaxApp || (window.WebApp && !window.Telegram)) return 'max';

  if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) return 'tg';

  // Если ничего не определилось — по умолчанию tg
  return 'tg';
}

const PLATFORM = detectPlatform();

let platformInitData = '';

if (PLATFORM === 'tg') {
  const tg = window.Telegram && window.Telegram.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
    try {
      tg.setHeaderColor('#130421');
      tg.setBackgroundColor('#130421');
    } catch (e) {}
    platformInitData = tg.initData || '';
  }
} else if (PLATFORM === 'max') {
  // MAX SDK — интерфейс похож на Telegram, но может называться иначе
  const maxApp = window.MaxApp || window.WebApp;
  if (maxApp) {
    try {
      if (maxApp.ready) maxApp.ready();
      if (maxApp.expand) maxApp.expand();
    } catch (e) {}
    platformInitData = maxApp.initData || '';
  }
}

function closeApp() {
  try {
    if (PLATFORM === 'tg' && window.Telegram && window.Telegram.WebApp) {
      window.Telegram.WebApp.close();
    } else if (PLATFORM === 'max') {
      const maxApp = window.MaxApp || window.WebApp;
      if (maxApp && maxApp.close) maxApp.close();
    }
  } catch (e) {}
}

// ==================== ГЕОМЕТРИЯ ====================
function polarToCartesian(cx, cy, r, deg) {
  const a = (deg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
}
function sectorPath(cx, cy, r, start, end) {
  const s = polarToCartesian(cx, cy, r, end);
  const e = polarToCartesian(cx, cy, r, start);
  const large = end - start <= 180 ? '0' : '1';
  return `M ${cx} ${cy} L ${s.x} ${s.y} A ${r} ${r} 0 ${large} 0 ${e.x} ${e.y} Z`;
}
function sectorFill(tier, i) {
  if (tier === 'super') return 'url(#grad-super)';
  if (tier === 'rare')  return 'url(#grad-rare)';
  return i % 2 === 0 ? 'url(#grad-common-a)' : 'url(#grad-common-b)';
}

// ==================== ОТРИСОВКА КОЛЕСА ====================
function renderWheel() {
  const rotor = document.getElementById('rotor');
  rotor.innerHTML = '';
  PRIZES.forEach((prize, i) => {
    const c = i * 45;
    const path = document.createElementNS(SVG_NS, 'path');
    path.setAttribute('d', sectorPath(200, 200, 180, c - 22.5, c + 22.5));
    path.setAttribute('fill', sectorFill(prize.tier, i));
    path.setAttribute('stroke', '#fde68a');
    path.setAttribute('stroke-width', '2');
    if (prize.tier === 'super') path.setAttribute('filter', 'url(#super-glow)');
    rotor.appendChild(path);

    const theta = ((c - 90) * Math.PI) / 180;
    const x = 200 + 120 * Math.cos(theta);
    const y = 200 + 120 * Math.sin(theta);
    const g = document.createElementNS(SVG_NS, 'g');
    g.setAttribute('transform', `translate(${x} ${y}) rotate(${c - 90})`);

    const text = document.createElementNS(SVG_NS, 'text');
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('dominant-baseline', 'middle');
    text.setAttribute('font-size', prize.tier === 'super' ? '16' : '15');
    text.setAttribute('font-weight', prize.tier === 'super' ? '900' : '800');
    text.setAttribute('fill', prize.tier === 'super' ? '#451a03' : '#ffffff');
    text.setAttribute('style', prize.tier === 'super'
      ? 'text-shadow: 0 1px 2px rgba(255,255,255,0.5)'
      : 'text-shadow: 0 1px 3px rgba(0,0,0,0.5)');
    text.textContent = prize.tier === 'super' ? `★ ${prize.label} ★` : prize.label;
    g.appendChild(text);

    if (prize.tier === 'rare') {
      const t2 = document.createElementNS(SVG_NS, 'text');
      t2.setAttribute('text-anchor', 'middle');
      t2.setAttribute('dominant-baseline', 'middle');
      t2.setAttribute('font-size', '9');
      t2.setAttribute('font-weight', '700');
      t2.setAttribute('fill', '#fef3c7');
      t2.setAttribute('y', '16');
      t2.setAttribute('opacity', '0.85');
      t2.textContent = '✦ ✦ ✦';
      g.appendChild(t2);
    }
    rotor.appendChild(g);
  });

  const bulbs = document.getElementById('bulbs');
  bulbs.innerHTML = '';
  for (let i = 0; i < 16; i++) {
    const pos = polarToCartesian(200, 200, 191, (i * 360) / 16);
    const c = document.createElementNS(SVG_NS, 'circle');
    c.setAttribute('cx', pos.x); c.setAttribute('cy', pos.y);
    c.setAttribute('r', '3');
    c.setAttribute('fill', i % 2 === 0 ? '#fef3c7' : '#f472b6');
    c.setAttribute('opacity', '0.9');
    bulbs.appendChild(c);
  }
}

function renderStars() {
  const box = document.getElementById('stars');
  for (let i = 0; i < 28; i++) {
    const s = document.createElement('i');
    const size = 2 + (i % 3);
    s.style.left = `${(i * 37) % 100}%`;
    s.style.top  = `${(i * 53) % 100}%`;
    s.style.width = s.style.height = `${size}px`;
    s.style.background = i % 3 === 0 ? '#fbbf24' : '#f472b6';
    s.style.opacity = 0.25 + (i % 5) * 0.1;
    s.style.animationDuration = `${3 + (i % 4)}s`;
    s.style.animationDelay = `${(i % 5) * 0.4}s`;
    box.appendChild(s);
  }
}

// ==================== КОНФЕТТИ ====================
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
let particles = [];
let rafId = null;
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function animateParticles() {
  if (rafId) return;
  const step = () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const p of particles) {
      if (p.life <= 0) continue;
      p.x += p.vx; p.y += p.vy;
      p.vy += p.gravity; p.vx *= 0.99;
      p.rotation += p.vr; p.life -= 1;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate((p.rotation * Math.PI) / 180);
      ctx.globalAlpha = Math.min(1, p.life / 60);
      ctx.fillStyle = p.color;
      if (p.shape === 'rect') {
        ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.55);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
    particles = particles.filter(p => p.life > 0);
    if (particles.length > 0) rafId = requestAnimationFrame(step);
    else { rafId = null; ctx.clearRect(0, 0, canvas.width, canvas.height); }
  };
  rafId = requestAnimationFrame(step);
}

function burst(intensity, ox, oy) {
  const cx = ox ?? canvas.width / 2;
  const cy = oy ?? canvas.height / 2;
  const cfg = ({
    common: { count: 60,  colors: ['#ec4899', '#f472b6', '#fbbf24', '#fef3c7'] },
    rare:   { count: 140, colors: ['#ec4899', '#fbbf24', '#f59e0b', '#a855f7', '#fef3c7'] },
    super:  { count: 280, colors: ['#fbbf24', '#f59e0b', '#ec4899', '#d946ef', '#ffffff', '#fde68a'] }
  })[intensity];
  for (let i = 0; i < cfg.count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * 16 + 6;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - Math.random() * 5,
      gravity: 0.25,
      color: cfg.colors[Math.floor(Math.random() * cfg.colors.length)],
      size: Math.random() * 9 + 4,
      rotation: Math.random() * 360,
      vr: (Math.random() - 0.5) * 20,
      life: 180 + Math.random() * 80,
      shape: Math.random() < 0.55 ? 'rect' : 'circle'
    });
  }
  animateParticles();
}

function celebrate(tier) {
  burst(tier);
  if (tier === 'super') {
    setTimeout(() => burst('rare', canvas.width * 0.2, canvas.height * 0.35), 350);
    setTimeout(() => burst('rare', canvas.width * 0.8, canvas.height * 0.35), 650);
    setTimeout(() => burst('super'), 1000);
    setTimeout(() => burst('common', canvas.width * 0.5, canvas.height * 0.2), 1400);
  } else if (tier === 'rare') {
    setTimeout(() => burst('common', canvas.width * 0.3, canvas.height * 0.4), 400);
    setTimeout(() => burst('common', canvas.width * 0.7, canvas.height * 0.4), 700);
  }
}

// ==================== API ====================
async function callApi(payload) {
  payload.platform = PLATFORM;
  payload.initData = platformInitData;
  const r = await fetch(BACKEND_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const data = await r.json();
  if (!data.ok) throw new Error(data.error || 'Ошибка сервера');
  return data;
}

// ==================== UI ====================
let isSpinning = false;
let hasSpun = false;

function setStatus(msg) {
  const el = document.getElementById('status');
  el.textContent = msg; el.classList.remove('hidden');
}
function showError(msg) {
  document.getElementById('status').classList.add('hidden');
  const el = document.getElementById('error');
  el.textContent = msg; el.classList.remove('hidden');
}

function showModal(prize, withConfetti) {
  const m = document.getElementById('modal');
  m.classList.remove('common', 'rare', 'super');
  m.classList.add(prize.tier);
  const badge = document.getElementById('modal-badge');
  const sub = document.getElementById('modal-sub');
  if (prize.tier === 'super') { badge.textContent = '👑 ДЖЕКПОТ'; sub.textContent = 'Невероятно!'; }
  else if (prize.tier === 'rare') { badge.textContent = '✨ КРУТОЙ ПРИЗ'; sub.textContent = 'Отличный выигрыш!'; }
  else { badge.textContent = '🎁 ВЫИГРЫШ'; sub.textContent = 'Поздравляем!'; }
  document.getElementById('modal-label').textContent = prize.label;
  document.getElementById('modal-backdrop').classList.remove('hidden');
  if (withConfetti) celebrate(prize.tier);
}

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal-backdrop').classList.add('hidden');
  closeApp();
});

function findPrizeIndex(id) { return PRIZES.findIndex(p => p.id === id); }

async function handleStart() {
  if (isSpinning || hasSpun) return;
  const btn = document.getElementById('start-btn');
  isSpinning = true;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    const data = await callApi({ action: 'spin' });

    if (data.alreadySpun) {
      isSpinning = false; hasSpun = true;
      setStatus('🎁 Ваш приз уже был выдан');
      showModal(data.prize, false);
      return;
    }

    const prize = data.prize;
    const idx = findPrizeIndex(prize.id);
    const jitter = (Math.random() - 0.5) * 32;
    const target = 6 * 360 - idx * 45 + jitter;
    document.getElementById('rotor').style.transform = `rotate(${target}deg)`;

    setTimeout(() => {
      isSpinning = false;
      hasSpun = true;
      btn.innerHTML = '✓';
      showModal(prize, true);
      setStatus('🎁 Приз отправлен в чат бота!');

      // Отправляем сообщение в чат ПОСЛЕ анимации
      callApi({ action: 'notify' })
        .catch(err => console.error('notify failed:', err));
    }, 5200);
  } catch (err) {
    isSpinning = false;
    document.getElementById('start-btn').innerHTML = 'СТАРТ';
    document.getElementById('start-btn').disabled = false;
    showError('Ошибка: ' + err.message);
  }
}

async function init() {
  renderWheel();
  renderStars();

  if (!platformInitData) {
    showError('Это приложение нужно открывать через мессенджер (Telegram или MAX)');
    return;
  }

  try {
    const data = await callApi({ action: 'check' });
    const btn = document.getElementById('start-btn');
    if (data.alreadySpun) {
      hasSpun = true;
      btn.disabled = true;
      btn.innerHTML = '✓';
      setStatus('🎁 Ваш приз уже был выдан');
      showModal(data.prize, false);
    } else {
      btn.disabled = false;
      btn.innerHTML = 'СТАРТ';
      btn.addEventListener('click', handleStart);
      setStatus('У вас есть 1 попытка. Удачи!');
    }
  } catch (err) {
    showError('Ошибка загрузки: ' + err.message);
  }
}

init();
</script>
</body>
</html>
